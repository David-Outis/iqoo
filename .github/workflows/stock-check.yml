name: iQOO Refurbished Stock Check
on:
  workflow_dispatch: {}   # lets you trigger manually from the Actions tab
  schedule:
    # All times below are UTC. Combined, they cover 07:00 -> 24:00 IST
    # (IST = UTC+5:30) every 10 minutes, and skip 00:00-07:00 IST as requested.
    - cron: "30,40,50 1 * * *"   # 07:00, 07:10, 07:20 IST
    - cron: "*/10 2-17 * * *"    # 07:30 IST through 23:20 IST, every 10 min
    - cron: "0,10,20,30 18 * * *" # 23:30, 23:40, 23:50, 24:00(next day 00:00) IST
permissions:
  contents: write   # needed so the workflow can commit updated state.json
concurrency:
  group: iqoo-stock-check
  cancel-in-progress: false
jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run stock check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python check_stock.py
      - name: Commit updated state (if changed)
        run: |
          git config user.name "stock-check-bot"
          git config user.email "actions@github.com"
          git add state.json

          if git diff --cached --quiet; then
            echo "No state change, skipping commit."
            exit 0
          fi

          git commit -m "Update stock state [skip ci]"

          # Push with a few retries: pull --rebase then push, in case another
          # run (or a manual push) landed on main in between our checkout and
          # this push. Concurrency group above stops overlapping *runs*, but
          # not a race against something pushed outside this workflow.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $attempt."
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Push failed after $attempt attempts."
              exit 1
            fi
            echo "Push rejected (attempt $attempt), rebasing onto latest main and retrying..."
            git fetch origin main
            git rebase origin/main
            sleep $((attempt * 3))
          done
